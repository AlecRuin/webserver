name: Lint

on:
  push:
    branches: [development]
  pull_request:
    branches: [master]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      # grab code
      - uses: actions/checkout@v4

      # install node
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # auto-fix swoggerslol
      - name: Lint client-swoggerslol
        run: |
          cd client-swoggerslol
          npm install
          npx eslint . --fix

      # auto-fix deadlab
      - name: Lint client-deadlab
        run: |
          cd client-deadlab
          npm install
          npx eslint . --fix

      # auto-fix server
      - name: Lint server
        run: |
          cd server
          npm install
          npx eslint . --fix

      # commit the auto-fixed changes back to the branch
      - name: Commit fixes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git diff --quiet || git commit -am "style: auto-fix lint errors" && git push